<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title translate="no" class="notranslate">Roblox Condo</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="/overlay.js?v=4"></script>
    <script type="module" crossorigin src="/assets/index-EMoPcdfT.js?v=2"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-C4WK_e_L.css?v=2">
    <link rel="stylesheet" href="/theme-override.css?v=2">
    <style>
      /* Esconder a barra do Google Translate */
      .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon { display: none !important; }
      body { top: 0px !important; }
      .goog-te-menu-value:hover { text-decoration: none !important; }
      .goog-tooltip { display: none !important; }
      .goog-tooltip:hover { display: none !important; }
      .goog-text-highlight { background-color: transparent !important; border: none !important; box-shadow: none !important; }
      #google_translate_element { display: none !important; }
      .skiptranslate { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element" style="display:none"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          autoDisplay: false
        }, 'google_translate_element');
      }

      // Lógica de detecção de localidade e tradução automática puramente client-side
      (function() {
        // Impedir tradução de termos específicos (Refinado)
        var protectedTerms = ["Roblox Condo", "Rblx New Condos", "Welcome to New Condos", "New Condos", "Roblox"];
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            // Monitorar novos elementos ou mudanças de texto
            var targets = [];
            if (mutation.type === 'childList') {
              mutation.addedNodes.forEach(node => { if (node.nodeType === 1) targets.push(node); });
            } else if (mutation.type === 'characterData') {
              targets.push(mutation.target.parentElement);
            }

            targets.forEach(function(target) {
              if (!target) return;
              // Se o próprio elemento contém um termo protegido, vamos envolver o termo em um span notranslate
              // em vez de bloquear o elemento inteiro, para permitir que o resto da frase seja traduzido.
              protectedTerms.forEach(function(term) {
                if (target.innerHTML && target.innerHTML.includes(term) && !target.innerHTML.includes('class="notranslate"')) {
                  var regex = new RegExp(term, 'g');
                  target.innerHTML = target.innerHTML.replace(regex, '<span class="notranslate" translate="no">' + term + '</span>');
                }
              });
            });
          });
        });
        observer.observe(document.body, { childList: true, subtree: true, characterData: true });

        function triggerTranslate(lang) {
          var checkInterval = setInterval(function() {
            var combo = document.querySelector('.goog-te-combo');
            if (combo) {
              combo.value = lang;
              combo.dispatchEvent(new Event('change'));
              clearInterval(checkInterval);
            }
          }, 500);
        }

        // Tentar obter localidade via API pública direta no navegador
        fetch('https://ipapi.co/json/')
          .then(res => res.json())
          .then(data => {
            var countryToLang = {
              'BR': 'pt', 'PT': 'pt', 'ES': 'es', 'MX': 'es', 'AR': 'es',
              'RU': 'ru', 'FR': 'fr', 'DE': 'de', 'IT': 'it'
            };
            var lang = countryToLang[data.country_code] || 'en';
            if (lang !== 'en') {
              triggerTranslate(lang);
            }
          })
          .catch(err => console.error('Locale error:', err));
      })();
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
