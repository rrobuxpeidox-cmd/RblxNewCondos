<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title translate="no" class="notranslate">Roblox Condo</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="/overlay.js?v=4"></script>
    <script type="module" crossorigin src="/assets/index-EMoPcdfT.js?v=2"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-C4WK_e_L.css?v=2">
    <link rel="stylesheet" href="/theme-override.css?v=2">
    <style>
      /* ── Google Translate: modo totalmente silencioso ── */
      /* Esconder banner, barra e qualquer iframe do GT */
      .goog-te-banner-frame,
      iframe.skiptranslate,
      .goog-te-balloon-frame,
      .goog-te-menu-frame,
      .goog-te-menu2,
      .goog-te-gadget-icon,
      .goog-te-spinner-pos,
      .goog-te-spinner-animation,
      #goog-gt-tt { display: none !important; height: 0 !important; border: none !important; }

      /* Impedir que o GT empurre o body para baixo */
      body,
      body.translated-ltr,
      body.translated-rtl { top: 0 !important; margin-top: 0 !important; }

      /* Remover highlight amarelo durante a tradução */
      .goog-text-highlight { background: none !important; border: none !important; box-shadow: none !important; }

      /* Sem sublinhado/tooltip ao hover em texto traduzido */
      .goog-te-menu-value:hover { text-decoration: none !important; }
      .goog-tooltip,
      .goog-tooltip:hover { display: none !important; }

      /* Elemento de controle: invisível mas funcional */
      #google_translate_element { display: none !important; }

      /* Garantir que notranslate seja respeitado */
      .notranslate, .skiptranslate { translate: no !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element" style="display:none"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          autoDisplay: false
        }, 'google_translate_element');
      }

      // Lógica de detecção de localidade e tradução automática puramente client-side
      (function() {
        function triggerTranslate(lang) {
          var checkInterval = setInterval(function() {
            var combo = document.querySelector('.goog-te-combo');
            if (combo) {
              combo.value = lang;
              combo.dispatchEvent(new Event('change'));
              clearInterval(checkInterval);
            }
          }, 500);
        }

        // Tentar obter localidade via API pública direta no navegador
        fetch('https://ipapi.co/json/')
          .then(res => res.json())
          .then(data => {
            var countryToLang = {
              'BR': 'pt', 'PT': 'pt', 'ES': 'es', 'MX': 'es', 'AR': 'es',
              'RU': 'ru', 'FR': 'fr', 'DE': 'de', 'IT': 'it'
            };
            var lang = countryToLang[data.country_code] || 'en';
            if (lang !== 'en') {
              triggerTranslate(lang);
            }
          })
          .catch(err => console.error('Locale error:', err));
      })();
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
